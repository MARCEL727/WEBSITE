<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Your Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        .sidebar-active {
            background: linear-gradient(to right, #22d3ee, #a855f7);
            color: #0f172a;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-[#1a0f2e] text-white h-screen overflow-hidden">

    <div class="flex h-full">

        <!-- Sidebar -->
        <div class="w-72 bg-[#1f1338] border-r border-purple-900 flex flex-col">
            <div class="p-6 border-b border-purple-800">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-3xl flex items-center justify-center text-3xl shadow-lg">
                        👤
                    </div>
                    <div>
                        <p class="font-bold text-lg">Marcel Agustian</p>
                        <p class="text-emerald-400 text-sm">Administrator</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 py-8 space-y-2">
                <a href="#" class="sidebar-active flex items-center gap-4 px-5 py-4 rounded-3xl text-base">
                    <i class="fas fa-home w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-5 py-4 hover:bg-white/10 rounded-3xl transition-all text-base">
                    <i class="fas fa-comments w-5"></i>
                    <span>Chat</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-5 py-4 hover:bg-white/10 rounded-3xl transition-all text-base">
                    <i class="fas fa-star w-5"></i>
                    <span>Favorites</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-5 py-4 hover:bg-white/10 rounded-3xl transition-all text-base">
                    <i class="fas fa-chart-bar w-5"></i>
                    <span>Statistics</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-5 py-4 hover:bg-white/10 rounded-3xl transition-all text-base">
                    <i class="fas fa-cog w-5"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="p-6 border-t border-purple-800 text-xs text-gray-500">
                © 2026 Marcel Dashboard
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-full">

            <!-- Top Header -->
            <header class="h-16 bg-[#2a1b4a] border-b border-purple-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-6 flex-1">
                    <div class="relative w-96">
                        <input type="text" id="search" 
                               class="w-full bg-[#1a1033] border border-purple-700 focus:border-cyan-400 rounded-full py-3 px-5 pl-12 outline-none text-sm"
                               placeholder="Cari data, laporan, atau pengguna...">
                        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-purple-400 to-pink-400">
                    YOUR TITLE
                </h1>

                <div class="flex items-center gap-8 flex-1 justify-end">
                    <button onclick="toggleNotifications()" class="relative text-2xl hover:text-cyan-400 transition-colors">
                        <i class="fas fa-bell"></i>
                        <span class="absolute -top-1 -right-1 bg-red-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">3</span>
                    </button>
                    
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="font-semibold">Marcel Trisno</p>
                            <p class="text-xs text-emerald-400">Online • Pekanbaru</p>
                        </div>
                        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl ring-2 ring-purple-400"></div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="flex-1 p-8 overflow-auto bg-gradient-to-br from-[#1a0f2e] to-[#2a1b4a]">
                <div class="grid grid-cols-12 gap-6">

                    <!-- Donut Chart -->
                    <div class="col-span-5 bg-[#2a1b4a] border border-purple-700 rounded-3xl p-8 card flex flex-col items-center">
                        <h3 class="text-xl font-semibold mb-6">Overall Progress</h3>
                        <div class="relative w-72 h-72">
                            <canvas id="doughnutChart"></canvas>
                            <div class="absolute inset-0 flex items-center justify-center text-center">
                                <div>
                                    <span class="text-7xl font-bold text-cyan-400">65</span>
                                    <span class="text-5xl font-bold text-cyan-400">%</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="alert('Action Confirmed! 🎉')" 
                                class="mt-10 bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 px-12 py-4 rounded-2xl font-semibold text-lg transition-all">
                            AGREE & CONTINUE
                        </button>
                    </div>

                    <!-- Progress Bars -->
                    <div class="col-span-3 bg-[#2a1b4a] border border-purple-700 rounded-3xl p-8 card">
                        <h3 class="font-semibold mb-8 text-lg">Project Progress</h3>
                        <div class="space-y-8">
                            <div>
                                <div class="flex justify-between mb-3">
                                    <span>Frontend Development</span>
                                    <span class="font-medium">50%</span>
                                </div>
                                <div class="h-4 bg-gray-700 rounded-2xl overflow-hidden">
                                    <div class="h-4 w-1/2 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-2xl"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between mb-3">
                                    <span>Backend API</span>
                                    <span class="font-medium">70%</span>
                                </div>
                                <div class="h-4 bg-gray-700 rounded-2xl overflow-hidden">
                                    <div class="h-4 w-[70%] bg-gradient-to-r from-cyan-400 to-purple-500 rounded-2xl"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between mb-3">
                                    <span>Testing & QA</span>
                                    <span class="font-medium">25%</span>
                                </div>
                                <div class="h-4 bg-gray-700 rounded-2xl overflow-hidden">
                                    <div class="h-4 w-1/4 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-2xl"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bar Chart -->
                    <div class="col-span-4 bg-[#2a1b4a] border border-purple-700 rounded-3xl p-8 card">
                        <h3 class="font-semibold mb-6 text-lg">Monthly Performance</h3>
                        <canvas id="barChart" class="h-96"></canvas>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Wave Charts (tidak digunakan lagi karena card dihapus)
        window.onload = () => {
            // Doughnut Chart
            new Chart(document.getElementById('doughnutChart'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [65, 35],
                        backgroundColor: ['#22d3ee', '#334155'],
                        borderWidth: 0,
                        cutout: '78%'
                    }]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { display: false } } 
                }
            });

            // Bar Chart
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Performance',
                        data: [72, 68, 85, 92, 78, 88],
                        backgroundColor: '#67e8f9',
                        borderRadius: 10,
                        barThickness: 32,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.08)' }, 
                            ticks: { color: '#94a3b8' } 
                        },
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.08)' }, 
                            ticks: { color: '#94a3b8' } 
                        }
                    }
                }
            });
        };

        function toggleNotifications() {
            alert("🛎️ Notifikasi Terbaru:\n\n1. Target penjualan bulan ini tercapai!\n2. 18 pengguna baru mendaftar hari ini\n3. Update sistem tersedia");
        }
    </script>
</body>
</html>
