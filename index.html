<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV-MARCEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .sidebar { transition: all 0.3s ease; }
        .modal { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .verified { color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- HEADER -->
    <header class="bg-black border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="menuBtn" class="text-4xl hover:text-gray-300">≡</button>
                <h1 class="text-2xl font-bold tracking-wider">DEV-MARCEL</h1>
            </div>

            <div onclick="toggleProfileMenu()" id="headerUser"
                 class="flex items-center gap-3 cursor-pointer hover:bg-gray-900 px-4 py-2 rounded-2xl">
                <div id="headerAvatar" class="w-9 h-9 bg-gray-700 rounded-2xl flex items-center justify-center text-2xl cursor-pointer">👤</div>
                <div>
                    <div class="flex items-center gap-1">
                        <p id="headerName" class="font-medium">PENGUNJUNG</p>
                        <span id="headerVerified" class="verified text-lg hidden">✔</span>
                    </div>
                    <p id="headerId" class="text-xs text-gray-500">ID: -</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar fixed md:static top-16 left-0 w-72 bg-black border-r border-gray-800 h-[calc(100vh-64px)] -translate-x-full md:translate-x-0 z-50 overflow-auto">
            <div class="p-6 space-y-2">
                <a onclick="showPage('dashboard')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
                <a onclick="showPage('chat')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-comment-dots"></i> <span>Chat</span>
                </a>
                <a onclick="showPage('setting')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </a>
                <a onclick="showPage('devPanel')" id="devMenu" class="nav-item hidden flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-shield-alt"></i> <span>DEV PANEL</span>
                </a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-6 overflow-auto">

            <!-- DASHBOARD -->
            <div id="page-dashboard" class="page">
                <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
                <div class="bg-gray-900 rounded-3xl p-8">
                    <div class="flex items-center gap-6">
                        <div id="dashAvatar" class="w-28 h-28 bg-gray-700 rounded-3xl text-7xl flex items-center justify-center">👤</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h2 id="dashName" class="text-3xl font-bold">PENGUNJUNG</h2>
                                <span id="dashVerified" class="verified text-2xl hidden">✔</span>
                            </div>
                            <p id="dashId" class="text-gray-400">ID: -</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS / PROFIL -->
            <div id="page-setting" class="page hidden">
                <h1 class="text-3xl font-bold mb-6">Profil Akun</h1>
                <div class="bg-gray-900 rounded-3xl p-8 max-w-lg">
                    <div class="flex flex-col items-center gap-4 mb-8">
                        <div onclick="changeProfilePic()" id="profileAvatar" 
                             class="w-32 h-32 bg-gray-700 rounded-3xl text-8xl flex items-center justify-center cursor-pointer hover:ring-4 hover:ring-blue-500 transition">
                            👤
                        </div>
                        <p class="text-sm text-gray-400">Klik untuk ganti foto profil</p>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm mb-1">Nama</label>
                            <input id="profileName" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">ID Game</label>
                            <input id="profileId" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl">
                        </div>
                    </div>

                    <div class="mt-10 flex gap-4">
                        <button onclick="logout()" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-medium">Keluar dari Akun</button>
                        <button onclick="confirmDeleteAccount()" class="flex-1 bg-gray-700 hover:bg-red-900 py-4 rounded-2xl font-medium">Hapus Akun</button>
                    </div>
                </div>
            </div>

            <!-- DEV PANEL -->
            <div id="page-devPanel" class="page hidden">
                <h1 class="text-3xl font-bold mb-6 text-yellow-400 flex items-center gap-3">
                    <i class="fas fa-shield-alt"></i> DEV PANEL
                </h1>

                <div class="space-y-8">
                    <!-- Daftar Akun Players -->
                    <div>
                        <h2 class="text-xl font-semibold mb-4">DAFTAR AKUN PLAYERS</h2>
                        <div id="accountsList" class="space-y-3"></div>
                    </div>

                    <!-- Daftar Akun Telah Dihapus -->
                    <div>
                        <h2 class="text-xl font-semibold mb-4 text-red-400">DAFTAR AKUN TELAH DI DELETE</h2>
                        <div id="deletedList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[100]">
        <div class="bg-gray-900 rounded-3xl w-full max-w-md mx-4 p-8 modal">
            <h2 class="text-2xl font-bold mb-6 text-center" id="modalTitle">Login / Daftar</h2>
            
            <div class="flex border-b border-gray-700 mb-6">
                <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-3 font-medium border-b-2 border-blue-500">Login</button>
                <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-3 font-medium">Daftar</button>
            </div>

            <div id="loginForm">
                <input id="loginName" placeholder="Nama Akun / Email" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="loginPass" type="password" placeholder="Password" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl font-medium">MASUK</button>
            </div>

            <div id="registerForm" class="hidden">
                <input id="regName" placeholder="Nama Games Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regId" placeholder="ID Akun Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regEmail" placeholder="Email Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regPass" type="password" placeholder="Password Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="register()" class="w-full bg-green-600 py-4 rounded-2xl font-medium">DAFTAR AKUN</button>
            </div>

            <button onclick="closeModal()" class="mt-6 text-gray-400 hover:text-white w-full">Tutup</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let accounts = JSON.parse(localStorage.getItem('accounts')) || [];
        let deletedAccounts = JSON.parse(localStorage.getItem('deletedAccounts')) || [];

        const DEV_EMAIL = "DEV-BOTMARCELWEB999@gmail.com";
        const DEV_PASS = "DEV-BOTMARCELNEW2026999";

        function saveData() {
            localStorage.setItem('accounts', JSON.stringify(accounts));
            localStorage.setItem('deletedAccounts', JSON.stringify(deletedAccounts));
        }

        function updateHeader() {
            const avatar = document.getElementById('headerAvatar');
            const nameEl = document.getElementById('headerName');
            const idEl = document.getElementById('headerId');
            const verified = document.getElementById('headerVerified');

            if (currentUser) {
                avatar.innerHTML = currentUser.avatar || '👤';
                nameEl.textContent = currentUser.name;
                idEl.textContent = `ID: ${currentUser.id}`;
                verified.classList.toggle('hidden', currentUser.name !== "BOTMARCEL");
            } else {
                avatar.innerHTML = '👤';
                nameEl.textContent = "PENGUNJUNG";
                idEl.textContent = "ID: -";
                verified.classList.add('hidden');
            }
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');

            if (page === 'setting' && currentUser) {
                document.getElementById('profileName').value = currentUser.name;
                document.getElementById('profileId').value = currentUser.id;
                document.getElementById('profileAvatar').innerHTML = currentUser.avatar || '👤';
            }

            if (page === 'devPanel' && currentUser?.isDev) {
                renderDevPanel();
            }
        }

        function toggleProfileMenu() {
            if (!currentUser) openModal();
            else showPage('setting');
        }

        // Modal Auth
        function openModal() { document.getElementById('authModal').classList.remove('hidden'); switchTab(0); }
        function closeModal() { document.getElementById('authModal').classList.add('hidden'); }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 0);
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 1);
        }

        function register() {
            // ... (sama seperti sebelumnya, saya ringkas)
            const name = document.getElementById('regName').value.trim();
            if (!name) return alert("Nama harus diisi!");

            if (accounts.some(a => a.name === name)) return alert("Nama sudah digunakan!");

            const newAcc = {
                name, 
                id: document.getElementById('regId').value || "ID-" + Date.now(),
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                avatar: '👤'
            };

            accounts.push(newAcc);
            saveData();
            currentUser = newAcc;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert("✅ Akun berhasil dibuat!");
            closeModal();
            updateHeader();
            showPage('dashboard');
        }

        function login() {
            const input = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            // Login DEV
            if (input === DEV_EMAIL && pass === DEV_PASS) {
                currentUser = {
                    name: "BOTMARCEL",
                    id: "999999",
                    email: DEV_EMAIL,
                    avatar: '👤',
                    isDev: true
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert("✅ Login DEV berhasil! (Verified)");
                closeModal();
                updateHeader();
                document.getElementById('devMenu').classList.remove('hidden');
                showPage('dashboard');
                return;
            }

            const user = accounts.find(a => (a.name === input || a.email === input) && a.password === pass);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert("✅ Login berhasil!");
                closeModal();
                updateHeader();
                showPage('dashboard');
            } else {
                alert("❌ Login gagal!");
            }
        }

        function logout() {
            if (confirm("Keluar dari akun?")) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateHeader();
                showPage('dashboard');
            }
        }

        function confirmDeleteAccount() {
            if (!currentUser) return;
            if (confirm("HAPUS AKUN PERMANEN?") && confirm("⚠️ AKSI INI TIDAK BISA DIBATALKAN!")) {
                deletedAccounts.push({...currentUser, deletedAt: new Date().toLocaleString()});
                accounts = accounts.filter(a => a.id !== currentUser.id);
                saveData();
                logout();
                alert("Akun telah dihapus permanen.");
            }
        }

        function changeProfilePic() {
            if (!currentUser) return;
            const emoji = prompt("Masukkan emoji baru untuk foto profil:", currentUser.avatar || "👤");
            if (emoji) {
                currentUser.avatar = emoji;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateHeader();
                showPage('setting');
            }
        }

        function renderDevPanel() {
            // Players
            const accList = document.getElementById('accountsList');
            accList.innerHTML = accounts.map((acc, i) => `
                <div class="bg-gray-800 p-5 rounded-2xl flex justify-between items-center">
                    <div>
                        <div class="font-medium">${acc.name}</div>
                        <div class="text-sm text-gray-400">ID: ${acc.id} • ${acc.email}</div>
                    </div>
                    <button onclick="devDeleteAccount(${i})" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-xl text-sm">DELETE</button>
                </div>
            `).join('');

            // Deleted
            const delList = document.getElementById('deletedList');
            delList.innerHTML = deletedAccounts.map(acc => `
                <div class="bg-gray-800/50 p-5 rounded-2xl opacity-75">
                    <div class="font-medium text-red-400">${acc.name}</div>
                    <div class="text-sm text-gray-400">ID: ${acc.id} • Dihapus: ${acc.deletedAt}</div>
                </div>
            `).join('');
        }

        function devDeleteAccount(index) {
            if (confirm("Hapus akun player ini secara permanen?")) {
                const acc = accounts[index];
                deletedAccounts.push({...acc, deletedAt: new Date().toLocaleString()});
                accounts.splice(index, 1);
                saveData();
                renderDevPanel();
            }
        }

        // Init
        window.onload = () => {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                if (currentUser.isDev) document.getElementById('devMenu').classList.remove('hidden');
            }
            updateHeader();
            showPage('dashboard');
        };
    </script>
</body>
</html>
