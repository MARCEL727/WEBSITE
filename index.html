<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE BIG OFFROAD LEAGUE INDONESIA - BY MARCEL</title>
  <link rel="icon" href="IMG_20260401_051554.jpg">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000 url('https://i.ibb.co/vxwgxSR6/IMG-20260501-015200.jpg') center/cover no-repeat fixed;
      color: #ffeedd;
      font-family: 'Courier New', Courier, monospace;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(40,15,0,0.80));
      z-index: 0;
      pointer-events: none;
    }

    /* ================== MENU HAMBURGER ================== */
    .hamburger {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 2.2rem;
      color: #ffaa00;
      background: rgba(0,0,0,0.6);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffaa00;
      border-radius: 10px;
      cursor: pointer;
      z-index: 10000;
      transition: all 0.3s ease;
    }

    .hamburger:hover {
      background: #ffaa00;
      color: #000;
      transform: scale(1.1);
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100vh;
      background: rgba(20, 15, 10, 0.98);
      border-right: 4px solid #ffaa00;
      z-index: 9999;
      transition: left 0.4s ease;
      padding: 80px 20px 30px;
      box-shadow: 5px 0 20px rgba(0,0,0,0.8);
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 40px;
      color: #ffcc44;
      font-size: 1.4rem;
      letter-spacing: 3px;
    }

    .menu-item {
      display: block;
      padding: 16px 20px;
      color: #ffeedd;
      text-decoration: none;
      font-size: 1.2rem;
      letter-spacing: 2px;
      margin: 8px 0;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .menu-item:hover {
      background: rgba(255, 170, 0, 0.25);
      color: #ffaa00;
      padding-left: 30px;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ================== LOADING SCREEN ================== */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100vh;
      background: #000 url('https://i.ibb.co/4RybTbRq/your-loading-image.jpg') center/cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      transition: opacity 1.8s ease;
    }

    #loading-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.88), rgba(60,25,0,0.92));
      z-index: 1;
    }

    .loading-content {
      text-align: center;
      z-index: 2;
    }

    .loading-title {
      color: #ffaa00;
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 25px #ff5500, 0 0 50px #ffaa00;
      margin-bottom: 15px;
      animation: glitch-loading 2.2s infinite alternate;
    }

    @keyframes glitch-loading {
      0% { text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
      20% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; }
      40% { text-shadow: 3px 0 #ffff00, -3px 0 #00ff00; }
      100% { text-shadow: 0 0 40px #ffaa00; }
    }

    .loading-subtitle {
      color: #ffcc77;
      font-size: 1.45rem;
      letter-spacing: 6px;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    .progress-percentage {
      color: #ffdd88;
      font-size: 2.1rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #ffaa00;
      margin-bottom: 8px;
    }

    .progress-container {
      width: 340px;
      max-width: 85vw;
      height: 14px;
      background: rgba(255,170,0,0.15);
      border: 3px solid #ffaa00;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255, 170, 0, 0.7);
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffaa00, #ff7700, #ffaa00);
      transition: width 0.4s linear;
      box-shadow: 0 0 20px #ff8800;
    }

    .loading-text {
      margin-top: 18px;
      color: #ffdd99;
      font-size: 1.15rem;
      letter-spacing: 3px;
    }

    /* ================== KONTEN UTAMA ================== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 20px 60px;
      position: relative;
      z-index: 2;
      text-align: center;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .container.loaded {
      opacity: 1;
    }

    .profile-card {
      width: 220px;
      height: 280px;
      margin: 0 auto 25px;
      background: rgba(40, 20, 10, 0.8);
      border: 4px solid #ffaa00;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 45px rgba(255, 170, 0, 0.6);
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      color: #ffdd88;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-shadow: 0 0 15px #ffaa00;
      margin-bottom: 10px;
    }

    .profile-info {
      color: #ffcc77;
      font-size: 1.25rem;
      margin: 15px 0;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      opacity: 0.65;
      font-size: 0.95rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ================== HAMBURGER MENU ================== -->
  <div class="hamburger" id="hamburger">≡</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">MENU TEAM MARCEL</div>
    <a href="#" onclick="goToHome()" class="menu-item">🏠 BERANDA</a>
    <a href="#" class="menu-item">🛠 SUPPORT</a>
    <a href="#" class="menu-item">⚙️ SETTING</a>
    <a href="#" class="menu-item">👤 PROFIL</a>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- ================== LOADING SCREEN ================== -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-title">TEAM MARCEL</div>
      <div class="loading-subtitle">THE BIG OFFROAD LEAGUE INDONESIA</div>
      
      <div class="progress-percentage" id="percentage">0%</div>
      <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
      </div>
      <div class="loading-text" id="loading-text">MEMUAT KENDARAAN OFFROAD...</div>
    </div>
  </div>

  <!-- ================== KONTEN UTAMA (BERANDA) ================== -->
  <div class="container" id="main-content">
    <div class="profile-card">
      <img 
        src="https://media.craiyon.com/2025-08-25/B_IkxjUoRCGtmx_j_YW4cw.webp" 
        alt="Marcel" 
        class="profile-img"
      >
    </div>

    <div class="profile-name">MARCEL</div>
    <div class="profile-info">
      FOUNDER • THE BIG OFFROAD LEAGUE INDONESIA<br>
      USERNAME: BOTMARCEL
    </div>

    <footer>
      ★ TEAM THE BIG OFFROAD LEAGUE INDONESIA © MARCEL 2026 ★
    </footer>
  </div>

  <script>
    // ================== LOADING SCREEN ==================
    function startLoading() {
      const loadingScreen = document.getElementById('loading-screen');
      const mainContent = document.getElementById('main-content');
      const progressBar = document.getElementById('progress');
      const percentageText = document.getElementById('percentage');
      const loadingText = document.getElementById('loading-text');

      let progress = 0;

      const fakeLoading = setInterval(() => {
        progress += Math.random() * 4 + 2.5;
        if (progress > 100) progress = 100;

        progressBar.style.width = progress + '%';
        percentageText.textContent = Math.floor(progress) + '%';

        if (progress < 30) loadingText.textContent = "MEMUAT KENDARAAN OFFROAD...";
        else if (progress < 55) loadingText.textContent = "MENYIAPKAN TRACK BALAP...";
        else if (progress < 75) loadingText.textContent = "MENYAMBUNGKAN KE SERVER...";
        else if (progress < 92) loadingText.textContent = "FINAL CHECKING...";
        else loadingText.textContent = "SELAMAT DATANG!";

        if (progress >= 100) {
          clearInterval(fakeLoading);
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
              mainContent.classList.add('loaded');
              mainContent.style.opacity = '1';
            }, 1600);
          }, 500);
        }
      }, 110);
    }

    // ================== MENU FUNCTION ==================
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    hamburger.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    // Fungsi Beranda (kembali ke atas / refresh halaman)
    function goToHome() {
      toggleMenu();           // tutup menu
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Tutup menu saat klik item lain
    document.querySelectorAll('.menu-item').forEach(item => {
      if (!item.getAttribute('onclick')) {
        item.addEventListener('click', () => {
          toggleMenu();
        });
      }
    });

    // Jalankan loading saat halaman dimuat
    window.addEventListener('load', startLoading);
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) startLoading();
    });
  </script>

</body>
</html>
