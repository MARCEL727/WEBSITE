<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV-MARCEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .sidebar { transition: all 0.3s ease; }
        .modal { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- HEADER -->
    <header class="bg-black border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="menuBtn" class="text-4xl hover:text-gray-300">≡</button>
                <h1 class="text-2xl font-bold tracking-wider">DEV-MARCEL</h1>
            </div>

            <div onclick="toggleProfileMenu()" id="headerUser"
                 class="flex items-center gap-3 cursor-pointer hover:bg-gray-900 px-4 py-2 rounded-2xl">
                <div id="headerAvatar" class="w-9 h-9 bg-gray-700 rounded-2xl flex items-center justify-center text-2xl">👤</div>
                <div>
                    <p id="headerName" class="font-medium">PENGUNJUNG</p>
                    <p id="headerId" class="text-xs text-gray-500">ID: -</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar fixed md:static top-16 left-0 w-72 bg-black border-r border-gray-800 h-[calc(100vh-64px)] -translate-x-full md:translate-x-0 z-50">
            <div class="p-6 space-y-2">
                <a onclick="showPage('dashboard')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
                <a onclick="showPage('chat')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-comment-dots"></i> <span>Chat</span>
                </a>
                <a onclick="showPage('setting')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-6 overflow-auto">

            <!-- DASHBOARD -->
            <div id="page-dashboard" class="page">
                <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
                <div class="bg-gray-900 rounded-3xl p-8">
                    <div class="flex items-center gap-6">
                        <div id="dashAvatar" class="w-28 h-28 bg-gray-700 rounded-3xl text-7xl flex items-center justify-center">👤</div>
                        <div>
                            <h2 id="dashName" class="text-3xl font-bold">PENGUNJUNG</h2>
                            <p id="dashId" class="text-gray-400">ID: -</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS / PROFILE -->
            <div id="page-setting" class="page hidden">
                <h1 class="text-3xl font-bold mb-6">Profil & Settings</h1>
                <div class="bg-gray-900 rounded-3xl p-8 max-w-lg">
                    <div class="flex flex-col items-center gap-4 mb-8">
                        <div onclick="changeProfilePic()" id="profileAvatar" 
                             class="w-32 h-32 bg-gray-700 rounded-3xl text-8xl flex items-center justify-center cursor-pointer hover:ring-4 hover:ring-blue-500">
                            👤
                        </div>
                        <p class="text-sm text-gray-400">Klik untuk ganti foto</p>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm mb-1">Nama</label>
                            <input id="profileName" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">ID Game</label>
                            <input id="profileId" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl">
                        </div>
                    </div>

                    <div class="mt-8 flex gap-4">
                        <button onclick="logout()" 
                                class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-medium">
                            Keluar dari Akun
                        </button>
                        <button onclick="confirmDeleteAccount()" 
                                class="flex-1 bg-gray-700 hover:bg-red-900 py-4 rounded-2xl font-medium">
                            Hapus Akun
                        </button>
                    </div>
                </div>
            </div>

            <!-- DEV PANEL (hanya untuk DEV) -->
            <div id="devPanel" class="page hidden">
                <h1 class="text-3xl font-bold mb-6 text-yellow-400">🔧 DEV PANEL</h1>
                <div class="bg-gray-900 rounded-3xl p-6">
                    <h2 class="text-xl mb-4">Daftar Akun Players</h2>
                    <div id="accountsList" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- LOGIN / REGISTER MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-3xl w-full max-w-md mx-4 p-8 modal">
            <h2 class="text-2xl font-bold mb-6 text-center" id="modalTitle">Masuk / Daftar</h2>
            
            <!-- TAB -->
            <div class="flex border-b border-gray-700 mb-6">
                <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-3 font-medium border-b-2 border-blue-500">Login</button>
                <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-3 font-medium">Daftar</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <input id="loginName" placeholder="Nama Akun" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="loginPass" type="password" placeholder="Password" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl font-medium">MASUK</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="hidden">
                <input id="regName" placeholder="Masukan Nama Games Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regId" placeholder="Masukan ID Akun Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regEmail" placeholder="Masukan Email Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regPass" type="password" placeholder="Masukan Password Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="register()" class="w-full bg-green-600 py-4 rounded-2xl font-medium">DAFTAR AKUN</button>
            </div>

            <button onclick="closeModal()" class="mt-6 text-gray-400 hover:text-white w-full">Tutup</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let accounts = JSON.parse(localStorage.getItem('accounts')) || [];

        const DEV_EMAIL = "DEV-BOTMARCELWEB999@gmail.com";
        const DEV_PASS = "DEV-BOTMARCELNEW2026999";

        function saveAccounts() {
            localStorage.setItem('accounts', JSON.stringify(accounts));
        }

        function updateHeader() {
            if (currentUser) {
                document.getElementById('headerName').textContent = currentUser.name;
                document.getElementById('headerId').textContent = `ID: ${currentUser.id}`;
                document.getElementById('headerAvatar').innerHTML = currentUser.avatar || '👤';
            } else {
                document.getElementById('headerName').textContent = "PENGUNJUNG";
                document.getElementById('headerId').textContent = "ID: -";
                document.getElementById('headerAvatar').innerHTML = '👤';
            }
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');

            if (page === 'setting' && currentUser) {
                document.getElementById('profileName').value = currentUser.name;
                document.getElementById('profileId').value = currentUser.id;
                document.getElementById('profileAvatar').innerHTML = currentUser.avatar || '👤';
            }

            if (page === 'devPanel' && currentUser && currentUser.email === DEV_EMAIL) {
                renderDevPanel();
            }
        }

        function toggleProfileMenu() {
            if (!currentUser) {
                openModal();
            } else {
                showPage('setting');
            }
        }

        // === AUTH MODAL ===
        function openModal() {
            document.getElementById('authModal').classList.remove('hidden');
            switchTab(0);
        }

        function closeModal() {
            document.getElementById('authModal').classList.add('hidden');
        }

        function switchTab(tab) {
            if (tab === 0) {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('tabLogin').classList.add('border-b-2', 'border-blue-500');
                document.getElementById('tabRegister').classList.remove('border-b-2', 'border-blue-500');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('tabLogin').classList.remove('border-b-2', 'border-blue-500');
                document.getElementById('tabRegister').classList.add('border-b-2', 'border-blue-500');
            }
        }

        function register() {
            const name = document.getElementById('regName').value.trim();
            const id = document.getElementById('regId').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if (!name || !id || !email || !pass) {
                alert("Semua field harus diisi!");
                return;
            }

            if (accounts.some(a => a.name === name || a.id === id)) {
                alert("Nama atau ID sudah digunakan!");
                return;
            }

            const newAccount = {
                name: name,
                id: id,
                email: email,
                password: pass,
                avatar: '👤'
            };

            accounts.push(newAccount);
            saveAccounts();

            currentUser = newAccount;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            alert("✅ Akun berhasil dibuat!");
            closeModal();
            updateHeader();
            showPage('dashboard');
        }

        function login() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            // Cek DEV Account
            if (name === DEV_EMAIL && pass === DEV_PASS) {
                currentUser = { name: "BOTMARCEL", id: "999999", email: DEV_EMAIL, avatar: '👤', isDev: true };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert("✅ Login DEV berhasil!");
                closeModal();
                updateHeader();
                showPage('dashboard');
                return;
            }

            const user = accounts.find(a => (a.name === name || a.email === name) && a.password === pass);

            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert("✅ Login berhasil!");
                closeModal();
                updateHeader();
                showPage('dashboard');
            } else {
                alert("❌ Nama / Email atau Password salah!");
            }
        }

        function logout() {
            if (confirm("Keluar dari akun?")) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateHeader();
                showPage('dashboard');
            }
        }

        function confirmDeleteAccount() {
            if (!currentUser) return;
            if (confirm("Hapus akun ini secara PERMANEN?")) {
                if (confirm("⚠️ AKUN AKAN DIHAPUS SELAMANYA. Lanjutkan?")) {
                    accounts = accounts.filter(a => a.id !== currentUser.id);
                    saveAccounts();
                    logout();
                    alert("Akun telah dihapus.");
                }
            }
        }

        function changeProfilePic() {
            if (!currentUser) return;
            const newAvatar = prompt("Masukkan emoji baru untuk foto profil (contoh: 🔥, 🐉, etc):", currentUser.avatar);
            if (newAvatar) {
                currentUser.avatar = newAvatar;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateHeader();
                showPage('setting');
            }
        }

        function renderDevPanel() {
            const container = document.getElementById('accountsList');
            container.innerHTML = '';

            accounts.forEach((acc, index) => {
                const div = document.createElement('div');
                div.className = "bg-gray-800 p-4 rounded-2xl flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${acc.name}</div>
                        <div class="text-sm text-gray-400">ID: ${acc.id} | ${acc.email}</div>
                    </div>
                    <button onclick="devDeleteAccount(${index})" class="bg-red-600 px-5 py-2 rounded-xl text-sm">DELETE</button>
                `;
                container.appendChild(div);
            });
        }

        function devDeleteAccount(index) {
            if (confirm("Hapus akun player ini secara permanen?")) {
                accounts.splice(index, 1);
                saveAccounts();
                renderDevPanel();
            }
        }

        // Load user saat halaman dibuka
        window.onload = () => {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            }
            updateHeader();
            showPage('dashboard');

            // Auto open sidebar di desktop
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
            }
        };
    </script>
</body>
  </html>
