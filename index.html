<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV-MARCEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .sidebar { transition: all 0.3s ease; }
        .modal { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .verified { color: #3b82f6; }
        .preview-img { object-fit: cover; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- HEADER -->
    <header class="bg-black border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="menuBtn" class="text-4xl hover:text-gray-300">≡</button>
                <h1 class="text-2xl font-bold tracking-wider">DEV-MARCEL</h1>
            </div>

            <div onclick="toggleProfileMenu()" id="headerUser" class="flex items-center gap-3 cursor-pointer hover:bg-gray-900 px-4 py-2 rounded-2xl">
                <div id="headerAvatar" class="w-9 h-9 bg-gray-700 rounded-2xl overflow-hidden flex items-center justify-center text-2xl">👤</div>
                <div>
                    <div class="flex items-center gap-1">
                        <p id="headerName" class="font-medium">PENGUNJUNG</p>
                        <span id="headerVerified" class="verified text-lg hidden">✔</span>
                    </div>
                    <p id="headerId" class="text-xs text-gray-500">ID: -</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar fixed md:static top-16 left-0 w-72 bg-black border-r border-gray-800 h-[calc(100vh-64px)] -translate-x-full md:translate-x-0 z-50 overflow-auto">
            <div class="p-6 space-y-2">
                <a onclick="showPage('dashboard')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer"><i class="fas fa-home"></i> <span>Dashboard</span></a>
                <a onclick="showPage('profil')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer"><i class="fas fa-user"></i> <span>Profil</span></a>
                <a onclick="showPage('setting')" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer"><i class="fas fa-cog"></i> <span>Settings</span></a>
                <a onclick="showPage('devPanel')" id="devMenu" class="nav-item hidden flex items-center gap-4 px-5 py-4 rounded-2xl hover:bg-gray-900 cursor-pointer"><i class="fas fa-shield-alt"></i> <span>DEV PANEL</span></a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-6 overflow-auto">

            <!-- DASHBOARD -->
            <div id="page-dashboard" class="page">
                <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
                <div class="bg-gray-900 rounded-3xl p-8 text-center">
                    <p class="text-xl">Selamat datang di DEV-MARCEL</p>
                </div>
            </div>

            <!-- PROFIL PAGE -->
            <div id="page-profil" class="page hidden">
                <div id="profilContent">
                    <!-- JS akan isi ini -->
                </div>
            </div>

            <!-- SETTINGS -->
            <div id="page-setting" class="page hidden">
                <h1 class="text-3xl font-bold mb-6">Pengaturan Website</h1>
                <div class="bg-gray-900 rounded-3xl p-8">Pengaturan website akan ditambahkan nanti.</div>
            </div>

            <!-- DEV PANEL -->
            <div id="page-devPanel" class="page hidden">
                <h1 class="text-3xl font-bold mb-6 text-yellow-400">🔧 DEV PANEL</h1>
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

                    <!-- Daftar Akun Players -->
                    <div class="bg-gray-900 rounded-3xl p-6">
                        <h2 class="text-xl font-semibold mb-4">DAFTAR AKUN PLAYERS</h2>
                        <div id="accountsList" class="space-y-4"></div>
                    </div>

                    <!-- Daftar Akun Banned -->
                    <div class="bg-gray-900 rounded-3xl p-6">
                        <h2 class="text-xl font-semibold mb-4 text-orange-400">DAFTAR AKUN YANG DI BANNED</h2>
                        <div id="bannedList" class="space-y-4"></div>
                    </div>

                    <!-- Daftar Akun Deleted -->
                    <div class="bg-gray-900 rounded-3xl p-6">
                        <h2 class="text-xl font-semibold mb-4 text-red-400">DAFTAR AKUN TELAH DI DELETE</h2>
                        <div id="deletedList" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[100]">
        <div class="bg-gray-900 rounded-3xl w-full max-w-md mx-4 p-8 modal">
            <h2 class="text-2xl font-bold mb-6 text-center">Login / Daftar</h2>
            <div class="flex border-b border-gray-700 mb-6">
                <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-3 font-medium border-b-2 border-blue-500">Login</button>
                <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-3 font-medium">Daftar</button>
            </div>

            <div id="loginForm">
                <input id="loginName" placeholder="Nama Akun / Email" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="loginPass" type="password" placeholder="Password" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-2xl font-medium">MASUK</button>
            </div>

            <div id="registerForm" class="hidden">
                <input id="regName" placeholder="Nama Games Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regId" placeholder="ID Akun Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regEmail" placeholder="Email Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-4">
                <input id="regPass" type="password" placeholder="Password Fake Anda" class="w-full bg-gray-800 px-5 py-4 rounded-2xl mb-6">
                <button onclick="register()" class="w-full bg-green-600 py-4 rounded-2xl font-medium">DAFTAR</button>
            </div>
            <button onclick="closeModal()" class="mt-6 text-gray-400 hover:text-white w-full">Tutup</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let accounts = JSON.parse(localStorage.getItem('accounts')) || [];
        let bannedAccounts = JSON.parse(localStorage.getItem('bannedAccounts')) || [];
        let deletedAccounts = JSON.parse(localStorage.getItem('deletedAccounts')) || [];

        const DEV_EMAIL = "DEV-BOTMARCELWEB999@gmail.com";
        const DEV_PASS = "DEV-BOTMARCELNEW2026999";

        function saveData() {
            localStorage.setItem('accounts', JSON.stringify(accounts));
            localStorage.setItem('bannedAccounts', JSON.stringify(bannedAccounts));
            localStorage.setItem('deletedAccounts', JSON.stringify(deletedAccounts));
        }

        function isBanned(user) {
            const banned = bannedAccounts.find(b => b.id === user.id);
            if (!banned) return null;
            if (banned.isPermanent) return "permanent";
            if (new Date(banned.banEnd) > new Date()) return "temporary";
            return null;
        }

        function updateHeader() {
            const avatar = document.getElementById('headerAvatar');
            if (currentUser?.avatarUrl) {
                avatar.innerHTML = `<img src="${currentUser.avatarUrl}" class="w-full h-full object-cover preview-img">`;
            } else {
                avatar.innerHTML = currentUser?.avatar || '👤';
            }
            document.getElementById('headerName').textContent = currentUser ? currentUser.name : "PENGUNJUNG";
            document.getElementById('headerId').textContent = currentUser ? `ID: ${currentUser.id}` : "ID: -";
            document.getElementById('headerVerified').classList.toggle('hidden', currentUser?.name !== "BOTMARCEL");
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');

            if (page === 'profil') renderProfilPage();
            if (page === 'devPanel' && currentUser?.isDev) renderDevPanel();
        }

        function renderProfilPage() {
            const container = document.getElementById('profilContent');
            if (!currentUser) {
                container.innerHTML = `
                    <div class="bg-gray-900 rounded-3xl p-12 text-center">
                        <p class="text-2xl mb-4">👤 Akun Anda Belum Ada</p>
                        <p class="text-gray-400 mb-8">Tolong daftar atau login dulu</p>
                        <button onclick="openModal()" class="bg-blue-600 px-8 py-4 rounded-2xl text-lg">Login / Daftar</button>
                    </div>`;
                return;
            }
            // Isi profil jika sudah login (sama seperti sebelumnya)
            container.innerHTML = `
                <h1 class="text-3xl font-bold mb-6">Profil Saya</h1>
                <div class="bg-gray-900 rounded-3xl p-8 max-w-lg mx-auto">
                    <div class="flex flex-col items-center gap-6">
                        <div onclick="triggerFileUpload()" class="w-40 h-40 bg-gray-700 rounded-3xl overflow-hidden cursor-pointer hover:ring-4 hover:ring-blue-500">
                            ${currentUser.avatarUrl ? `<img src="${currentUser.avatarUrl}" class="w-full h-full object-cover">` : currentUser.avatar || '👤'}
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                    </div>
                    <div class="mt-8 space-y-4">
                        <div><label class="block text-sm mb-1">Nama</label><input value="${currentUser.name}" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl"></div>
                        <div><label class="block text-sm mb-1">ID Game</label><input value="${currentUser.id}" readonly class="w-full bg-gray-800 px-5 py-4 rounded-2xl"></div>
                    </div>
                    <div class="mt-10 flex gap-4">
                        <button onclick="logout()" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-medium">KELUAR</button>
                        <button onclick="confirmDeleteAccount()" class="flex-1 bg-gray-700 hover:bg-red-900 py-4 rounded-2xl font-medium">Hapus Akun</button>
                    </div>
                </div>`;
        }

        function toggleProfileMenu() {
            if (!currentUser) openModal();
            else showPage('profil');
        }

        function openModal() { document.getElementById('authModal').classList.remove('hidden'); switchTab(0); }
        function closeModal() { document.getElementById('authModal').classList.add('hidden'); }
        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 0);
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 1);
        }

        function register() {
            const name = document.getElementById('regName').value.trim();
            if (!name) return alert("Nama harus diisi!");
            if (accounts.some(a => a.name === name)) return alert("Nama sudah digunakan!");

            const newAcc = {
                name, id: document.getElementById('regId').value || "ID-" + Date.now(),
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                avatar: '👤', avatarUrl: null
            };
            accounts.push(newAcc);
            saveData();
            currentUser = newAcc;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert("✅ Akun berhasil dibuat!");
            closeModal();
            updateHeader();
            showPage('profil');
        }

        function login() {
            const input = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            // DEV Login
            if (input === DEV_EMAIL && pass === DEV_PASS) {
                currentUser = { name: "BOTMARCEL", id: "999999", email: DEV_EMAIL, avatar: '👤', isDev: true, avatarUrl: null };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('devMenu').classList.remove('hidden');
                closeModal();
                updateHeader();
                showPage('profil');
                return;
            }

            let user = accounts.find(a => (a.name === input || a.email === input) && a.password === pass);
            if (!user) return alert("❌ Nama/Email atau Password salah!");

            const banStatus = isBanned(user);
            if (banStatus === "permanent") {
                return alert("AKUN ANDA TELAH DI BANNED PERMANENT\nTolong buat akun baru dan jangan ulangi kesalahan.");
            }
            if (banStatus === "temporary") {
                return alert("AKUN ANDA TELAH DI BANNED\nTolong tunggu beberapa hari.");
            }

            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert("✅ Login berhasil!");
            closeModal();
            updateHeader();
            showPage('profil');
        }

        function logout() {
            if (confirm("Keluar dari akun?")) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateHeader();
                showPage('dashboard');
            }
        }

        function confirmDeleteAccount() {
            if (!currentUser) return;
            if (confirm("Hapus akun PERMANEN?") && confirm("⚠️ TIDAK BISA DIBATALKAN!")) {
                deletedAccounts.push({...currentUser, deletedAt: new Date().toLocaleString()});
                accounts = accounts.filter(a => a.id !== currentUser.id);
                saveData();
                logout();
            }
        }

        // Upload Foto
        function triggerFileUpload() { document.getElementById('avatarInput').click(); }
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file || !currentUser) return;
            const reader = new FileReader();
            reader.onload = ev => {
                currentUser.avatarUrl = ev.target.result;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                renderProfilPage();
                updateHeader();
            };
            reader.readAsDataURL(file);
        }

        // DEV PANEL
        function renderDevPanel() {
            // Players
            document.getElementById('accountsList').innerHTML = accounts.map((acc, i) => `
                <div class="bg-gray-800 p-5 rounded-2xl">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 rounded-xl overflow-hidden">${acc.avatarUrl ? `<img src="${acc.avatarUrl}" class="w-full h-full object-cover">` : acc.avatar}</div>
                        <div class="flex-1">
                            <div class="font-medium">${acc.name}</div>
                            <div class="text-xs text-gray-400">ID: ${acc.id}<br>Email: ${acc.email || '-'}<br>Pass: ${acc.password || '-'}</div>
                        </div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="banAccount(${i}, false)" class="flex-1 bg-orange-600 hover:bg-orange-700 py-2 rounded-xl text-sm">BANNED</button>
                        <button onclick="banAccount(${i}, true)" class="flex-1 bg-red-600 hover:bg-red-700 py-2 rounded-xl text-sm">BANNED PERMANENT</button>
                    </div>
                </div>`).join('');

            // Banned List
            document.getElementById('bannedList').innerHTML = bannedAccounts.map((b, i) => `
                <div class="bg-gray-800 p-5 rounded-2xl">
                    <div>${b.avatarUrl ? '🖼️' : '👤'} ${b.name}</div>
                    <div class="text-xs text-gray-400">ID: ${b.id} • ${b.isPermanent ? 'PERMANENT' : 'Temporary'}</div>
                    ${!b.isPermanent ? `<button onclick="unbanAccount(${i})" class="mt-3 bg-green-600 px-5 py-1 rounded-xl text-sm">UNBANNED</button>` : ''}
                </div>`).join('');

            // Deleted
            document.getElementById('deletedList').innerHTML = deletedAccounts.map(acc => `
                <div class="bg-gray-800/60 p-5 rounded-2xl">
                    <div>${acc.name}</div>
                    <div class="text-xs text-gray-400">ID: ${acc.id}<br>Dihapus: ${acc.deletedAt}</div>
                </div>`).join('');
        }

        function banAccount(index, isPermanent) {
            const acc = accounts[index];
            bannedAccounts.push({
                ...acc,
                isPermanent,
                banEnd: isPermanent ? null : new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString()
            });
            accounts.splice(index, 1);
            saveData();
            renderDevPanel();
            alert(isPermanent ? "Akun dibanned PERMANENT" : "Akun dibanned sementara");
        }

        function unbanAccount(index) {
            accounts.push(bannedAccounts[index]);
            bannedAccounts.splice(index, 1);
            saveData();
            renderDevPanel();
        }

        // Init
        window.onload = () => {
            const saved = localStorage.getItem('currentUser');
            if (saved) currentUser = JSON.parse(saved);
            if (currentUser?.isDev) document.getElementById('devMenu').classList.remove('hidden');
            updateHeader();
            showPage('dashboard');
        };
    </script>
</body>
</html>
